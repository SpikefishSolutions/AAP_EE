services:
  opencode:
    image: opencode-docker:latest
    build:
      context: .
      dockerfile: Dockerfile
      # Forward proxy settings into `apt`, `curl`, `pip`, `npm install`
      # during image build. Empty when you're not behind a proxy.
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}

    container_name: opencode
    restart: unless-stopped

    ports:
      # Bind to loopback by default — opencode web has no authN/TLS on its own.
      # Override HOST_BIND=0.0.0.0 only if you put a reverse proxy in front.
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-4096}:4096"

    # ── Volumes ─────────────────────────────────────────────────
    volumes:
      # Project files — opencode edits these
      - ./workspace:/workspace:rw

      # opencode config, auth, sessions
      - ./config:/home/node/.config/opencode:rw
      - ./data:/home/node/.local/share/opencode:rw

      # Persistent package caches (named volumes — survive `docker compose down`)
      - opencode-pip-cache:/home/node/.cache/pip
      - opencode-npm-cache:/home/node/.npm

      # Persistent npm global install prefix (so `npm i -g <pkg>` at runtime
      # survives rebuilds alongside the image's preinstalled opencode).
      - opencode-npm-global:/home/node/.local

    # ── Environment ─────────────────────────────────────────────
    environment:
      # ▸ opencode web auth — required when binding to non-loopback.
      #   Set OPENCODE_SERVER_PASSWORD in .env; the web UI will prompt for it.
      #- OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:?Set OPENCODE_SERVER_PASSWORD in .env}

      # ▸ Model provider credentials — set whichever you use
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

      # ▸ Git identity (used by commits made inside the container)
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - GH_TOKEN=${GH_TOKEN:-}

      # ▸ Package persistence
      # Seconds between automatic pip/npm snapshots. Set to 0 to disable
      # periodic snapshots (on-demand + shutdown snapshots still run).
      - PACKAGE_SNAPSHOT_INTERVAL=${PACKAGE_SNAPSHOT_INTERVAL:-300}

      # ▸ Runtime tuning
      # Override the runtime UID/GID if your host user isn't 1000:1000 —
      # keeps bind-mount permissions in sync with the host.
      - PUID=${PUID:-}
      - PGID=${PGID:-}
      - TZ=${TZ:-America/New_York}

      # ▸ HTTP(S) proxy — both cases because tooling is inconsistent.
      #   Set via .env; leave blank if not behind a proxy.
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
      - no_proxy=${NO_PROXY:-}

volumes:
  opencode-pip-cache:
  opencode-npm-cache:
  opencode-npm-global:
